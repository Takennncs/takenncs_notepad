<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takenncs Sticky Notes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        body.visible {
            visibility: visible;
            opacity: 1;
        }
        .note-container {
            display: flex !important;
        }
    </style>
</head>
<body>
    <div class="note-container" id="noteContainer">
        <div class="note-header">
            <div class="header-left">
                <i class="fas fa-sticky-note"></i>
                <h2>Märkmik</h2>
            </div>
            <div class="header-right">
                <button class="btn btn-lock" id="lockBtn" title="Lukusta">
                    <i class="fas fa-lock-open"></i>
                </button>
                <button class="btn btn-close" id="closeBtn" title="Sulge">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <div class="note-title-section">
            <input type="text" class="note-title" id="noteTitle" placeholder="Pealkiri...">
        </div>

        <div class="note-toolbar" id="toolbar">
            <span class="ql-formats">
                <select class="ql-font"></select>
                <select class="ql-size"></select>
            </span>
            <span class="ql-formats">
                <button class="ql-bold"></button>
                <button class="ql-italic"></button>
                <button class="ql-underline"></button>
                <button class="ql-strike"></button>
            </span>
            <span class="ql-formats">
                <select class="ql-color"></select>
                <select class="ql-background"></select>
            </span>
            <span class="ql-formats">
                <button class="ql-list" value="ordered"></button>
                <button class="ql-list" value="bullet"></button>
                <button class="ql-indent" value="-1"></button>
                <button class="ql-indent" value="+1"></button>
            </span>
            <span class="ql-formats">
                <button class="ql-align"></button>
                <button class="ql-align" value="center"></button>
                <button class="ql-align" value="right"></button>
                <button class="ql-align" value="justify"></button>
            </span>
            <span class="ql-formats">
                <button class="ql-link"></button>
                <button class="ql-image"></button>
                <button class="ql-code-block"></button>
            </span>
            <span class="ql-formats">
                <button class="ql-clean"></button>
            </span>
        </div>

        <div class="note-editor" id="editor">
        </div>

        <div class="note-footer">
            <div class="footer-left">
                <span class="last-saved" id="lastSaved">Viimati salvestatud: -</span>
            </div>
            <div class="footer-right">
                <button class="btn btn-save" id="saveBtn">
                    <i class="fas fa-save"></i> Salvesta
                </button>
                <button class="btn btn-cancel" id="cancelBtn">
                    <i class="fas fa-times"></i> Tühista
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="imageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Sisesta pildi URL</h3>
                <i class="fas fa-times modal-close" id="closeModal"></i>
            </div>
            <div class="modal-body">
                <input type="text" id="imageUrl" placeholder="https://example.com/image.jpg">
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="cancelModal">Tühista</button>
                <button class="btn btn-save" id="insertImage">Sisesta</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
